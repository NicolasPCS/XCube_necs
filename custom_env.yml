name: xcube
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.9

  - cudatoolkit-dev=11.3
  - cudatoolkit=11.3

  - gcc=9
  - gxx=9

  - cmake=3.18
  - ninja
  - make
  - pkg-config

  - eigen
  - zlib
  - lz4
  - blosc
  - boost-cpp=1.74

  - pip
  - pybind11=2.10.0

  - pip:
      - https://download.pytorch.org/whl/cu113/torch-1.12.1%2Bcu113-cp39-cp39-linux_x86_64.whl
      - https://download.pytorch.org/whl/cu113/torchaudio-0.12.1%2Bcu113-cp39-cp39-linux_x86_64.whl
      - https://download.pytorch.org/whl/cu113/torchvision-0.13.1%2Bcu113-cp39-cp39-linux_x86_64.whl
      - requests
      - ninja
